<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lista de la compra</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lista">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#1971c2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
<style>
  :root {
    --bg: #f5f5f0;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #888;
    --green: #2b8a3e;
    --red: #e03131;
    --blue: #1971c2;
    --border: #dee2e6;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111113;
      --card: #1e1e22;
      --text: #e8e8e8;
      --muted: #888;
      --green: #40c057;
      --red: #ff6b6b;
      --blue: #4dabf7;
      --border: #2e2e36;
      --shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    padding-bottom: 200px;
    max-width: 600px;
    margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }

  /* Category groups */
  .cat-group { margin-bottom: 16px; }
  .cat-group.all-done { opacity: 0.6; }
  .cat-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 4px;
    margin-bottom: 6px;
  }
  .cat-header-emoji { font-size: 1.1rem; }
  .cat-header-label { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); flex: 1; }
  .cat-header-count { font-size: 0.78rem; color: var(--muted); }

  /* Items */
  .item {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 6px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
    transition: opacity 0.2s, transform 0.15s;
    cursor: pointer;
    user-select: none;
    min-height: 52px;
  }
  .item:active { transform: scale(0.98); }
  .item.checked { opacity: 0.5; }
  .item.checked .item-name { text-decoration: line-through; color: var(--muted); }
  .checkbox {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 2.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    transition: all 0.15s;
  }
  .item.checked .checkbox { background: var(--green); border-color: var(--green); color: white; }
  .item-name { flex: 1; font-size: 1.05rem; font-weight: 500; }
  .item-added { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; }
  .cat-btn {
    background: none; border: none;
    font-size: 1rem; padding: 4px 4px;
    cursor: pointer; opacity: 0.45;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  .cat-btn:active { opacity: 1; }
  .delete-btn {
    background: none; border: none;
    color: var(--red); font-size: 1.2rem;
    padding: 4px 8px; cursor: pointer;
    opacity: 0.5; transition: opacity 0.15s;
  }
  .delete-btn:active { opacity: 1; }

  /* Offline banner */
  .offline-banner {
    display: none;
    padding: 9px 16px;
    font-size: 0.82rem; font-weight: 600;
    text-align: center;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .offline-banner.offline  { background: #868e96; color: #fff; }
  .offline-banner.syncing  { background: var(--blue); color: #fff; }
  .offline-banner.pending  { background: #f59f00; color: #fff; }

  /* Bottom panel */
  .bottom-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    max-width: 600px; margin: 0 auto;
    background: var(--card);
    box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
    padding-bottom: max(0px, env(safe-area-inset-bottom));
  }
  .add-form { display: flex; gap: 8px; padding: 12px 16px; }
  .add-form input {
    flex: 1; padding: 12px 16px;
    border: 2px solid var(--border); border-radius: 10px;
    font-size: 1rem; outline: none; transition: border-color 0.15s;
  }
  .add-form input:focus { border-color: var(--blue); }
  .input-error { font-size: 0.78rem; color: var(--red); padding: 0 16px 6px; display: none; }
  .input-error.show { display: block; }
  .add-form button {
    background: var(--blue); color: white; border: none;
    border-radius: 10px; padding: 12px 20px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: background 0.15s;
  }
  .add-form button:active { background: #1558b0; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .emoji { font-size: 3rem; margin-bottom: 12px; }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%);
    background: #333; color: white;
    padding: 10px 20px; border-radius: 8px;
    font-size: 0.85rem; opacity: 0; transition: opacity 0.3s;
    z-index: 100; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .header-actions {
    position: fixed; top: 8px; right: 8px;
    display: flex; align-items: center; gap: 2px;
    z-index: 50;
  }
  .header-btn {
    background: none; border: none;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px; font-size: 1.3rem;
    cursor: pointer; opacity: 0.5;
    transition: opacity 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .header-btn:active { opacity: 1; background: rgba(128,128,128,0.12); }

  /* Suggestions */
  .suggestions-section { padding: 8px 16px 6px; border-bottom: 1px solid var(--border); }
  .suggestions-label {
    font-size: 0.68rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .suggestions-chips {
    display: flex; gap: 8px; overflow-x: auto;
    padding-bottom: 2px; scrollbar-width: none; align-items: center;
  }
  .suggestions-chips::-webkit-scrollbar { display: none; }
  .chip {
    display: flex; align-items: center;
    background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 7px 14px;
    white-space: nowrap; flex-shrink: 0; cursor: pointer;
    transition: background 0.15s, border-color 0.15s; user-select: none;
  }
  .chip:active { background: var(--border); }
  .chip-name { font-size: 0.88rem; font-weight: 500; }
  .chip-clear {
    background: none; border: none; color: var(--muted);
    font-size: 0.78rem; cursor: pointer; padding: 7px 10px;
    white-space: nowrap; flex-shrink: 0;
  }

  /* Category picker */
  .cat-picker {
    position: fixed; inset: 0; z-index: 200;
    display: none; flex-direction: column; justify-content: flex-end;
  }
  .cat-picker.open { display: flex; }
  .cat-picker-backdrop { flex: 1; background: rgba(0,0,0,0.45); }
  .cat-picker-sheet {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px max(20px, env(safe-area-inset-bottom));
    max-height: 72vh; overflow-y: auto;
  }
  .cat-picker-title { font-weight: 700; font-size: 0.95rem; text-align: center; margin-bottom: 16px; color: var(--muted); }
  .cat-picker-item { font-weight: 700; font-size: 1rem; text-align: center; margin-bottom: 16px; }
  .cat-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }
  .cat-option {
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 6px; border-radius: 12px;
    border: 2px solid var(--border); cursor: pointer; gap: 5px;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .cat-option:active { background: var(--bg); }
  .cat-option.selected { border-color: var(--blue); background: rgba(25,113,194,0.08); }
  .cat-option-emoji { font-size: 1.7rem; }
  .cat-option-label { font-size: 0.68rem; font-weight: 600; text-align: center; color: var(--muted); line-height: 1.2; }

  /* History panel */
  .history-panel {
    position: fixed; inset: 0; z-index: 200;
    display: none; flex-direction: column; justify-content: flex-end;
  }
  .history-panel.open { display: flex; }
  .history-backdrop { flex: 1; background: rgba(0,0,0,0.45); }
  .history-sheet {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px max(20px, env(safe-area-inset-bottom));
    max-height: 72vh; overflow-y: auto;
  }
  .history-sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .history-sheet-title { font-weight: 700; font-size: 1rem; }
  .history-close-btn {
    background: none; border: none;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; color: var(--muted); cursor: pointer;
    border-radius: 8px; -webkit-tap-highlight-color: transparent;
  }
  .history-entry {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .history-entry:last-child { border-bottom: none; }
  .history-entry-header { display: flex; align-items: center; justify-content: space-between; }
  .history-entry-meta { flex: 1; }
  .history-date { font-size: 0.78rem; color: var(--muted); margin-bottom: 4px; }
  .history-summary { font-size: 0.95rem; font-weight: 600; }
  .history-pct { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .history-chevron {
    color: var(--muted); font-size: 1rem; flex-shrink: 0;
    display: inline-block; transition: transform 0.2s; padding: 0 4px;
  }
  .history-entry.expanded .history-chevron { transform: rotate(180deg); }
  .history-detail { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .history-entry.expanded .history-detail { display: block; }
  .history-detail-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 0; font-size: 0.88rem;
    border-bottom: 1px solid var(--border);
  }
  .history-detail-item:last-child { border-bottom: none; }
  .history-detail-item.done { color: var(--muted); }
  .history-detail-cat { font-size: 0.9rem; flex-shrink: 0; width: 20px; text-align: center; }
  .history-detail-name { flex: 1; }
  .history-item-qty { font-size: 0.72rem; color: var(--muted); white-space: nowrap; margin-right: 4px; }
  .history-detail-check { color: var(--green); font-size: 0.8rem; flex-shrink: 0; }
  .history-empty { text-align: center; color: var(--muted); padding: 32px 0; font-size: 0.9rem; }
  .history-store { font-size: 0.8rem; margin-top: 4px; }
  .history-total { font-size: 0.8rem; color: var(--green); font-weight: 600; }
  .history-item-price { font-size: 0.78rem; color: var(--green); font-weight: 600; margin-left: auto; margin-right: 4px; white-space: nowrap; }
  .store-tag { display:inline-block; background:rgba(51,102,204,0.1); color:var(--blue); border-radius:8px; padding:1px 8px; font-size:0.7rem; font-weight:600; white-space:nowrap; }
  .history-detail-item { cursor:pointer; }
  .history-detail-item:active { background:rgba(0,0,0,0.04); }
  /* Edit overlay */
  .edit-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:400; display:none; align-items:flex-end; justify-content:center; }
  .edit-overlay.active { display:flex; }
  .edit-card { background:#fff; border-radius:20px 20px 0 0; padding:24px 20px 36px; width:100%; max-width:480px; }
  .edit-title { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
  .edit-name { font-weight:600; font-size:1rem; margin-bottom:20px; }
  .edit-row { display:flex; gap:12px; margin-bottom:16px; }
  .edit-field { flex:1; display:flex; flex-direction:column; gap:4px; }
  .edit-field label { font-size:0.75rem; color:var(--muted); }
  .edit-field input, .edit-field select { border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:0.95rem; width:100%; box-sizing:border-box; }
  .edit-btns { display:flex; gap:10px; margin-top:20px; }
  .edit-btns button { flex:1; padding:12px; border-radius:12px; border:none; font-size:0.95rem; cursor:pointer; }
  .edit-btns .btn-cancel { background:var(--bg-item); color:var(--muted); }
  .edit-btns .btn-save { background:var(--green); color:#fff; font-weight:600; }
  .history-item-ticket { font-size: 0.72rem; color: var(--muted); font-style: italic; padding-left: 22px; margin-top: 1px; }
  .item-price { font-size: 0.78rem; color: var(--green); font-weight: 600; white-space: nowrap; }
  .header-btn.has-receipts { background: rgba(43,138,62,0.12); color: var(--green); }
  /* Scan overlay */
  .scan-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:300; display:none; align-items:center; justify-content:center; }
  .scan-overlay.active { display:flex; }
  .scan-card { background:#fff; border-radius:20px; padding:36px 28px; text-align:center; min-width:240px; max-width:300px; }
  .scan-spinner { width:44px; height:44px; border:3px solid #e9ecef; border-top-color:var(--green); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .scan-icon { font-size:2.2rem; margin-bottom:10px; }
  .scan-msg { font-size:0.88rem; color:#333; line-height:1.6; }
  .scan-msg.ok { color:var(--green); }
  .scan-msg.ko { color:var(--red); }
  .scan-close { margin-top:16px; padding:8px 24px; border-radius:20px; background:var(--bg-item); border:none; cursor:pointer; font-size:0.85rem; color:var(--muted); display:none; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="scan-overlay" id="scan-overlay">
  <div class="scan-card">
    <div class="scan-spinner" id="scan-spinner"></div>
    <div class="scan-icon" id="scan-icon" style="display:none"></div>
    <div class="scan-msg" id="scan-msg">Procesando ticket...</div>
    <button class="scan-close" id="scan-close" onclick="closeScanOverlay()">Cerrar</button>
  </div>
</div>
<div class="edit-overlay" id="edit-overlay">
  <div class="edit-card">
    <div class="edit-title">Editar artículo</div>
    <div class="edit-name" id="edit-name"></div>
    <div class="edit-row">
      <div class="edit-field">
        <label>Precio (€)</label>
        <input type="number" id="edit-price" step="0.01" min="0" placeholder="—">
      </div>
      <div class="edit-field">
        <label>Cantidad</label>
        <input type="number" id="edit-qty" step="any" min="0" placeholder="—">
      </div>
      <div class="edit-field" style="max-width:80px">
        <label>Unidad</label>
        <select id="edit-unit">
          <option value="">—</option>
          <option value="ud">ud</option>
          <option value="kg">kg</option>
          <option value="g">g</option>
          <option value="l">l</option>
          <option value="ml">ml</option>
        </select>
      </div>
    </div>
    <div class="edit-btns">
      <button class="btn-cancel" onclick="cancelHistoryEdit()">Cancelar</button>
      <button class="btn-save" onclick="saveHistoryEdit()">Guardar</button>
    </div>
  </div>
</div>
<div class="header-actions">
  <button class="header-btn" id="receipt-btn" onclick="openReceiptScan()" aria-label="Escanear ticket">📷</button>
  <button class="header-btn" onclick="openHistory()" aria-label="Ver historial">🕐</button>
  <button class="header-btn" onclick="resetList()" aria-label="Vaciar lista">🗑️</button>
</div>
<input type="file" id="receipt-file-input" accept="image/*" onchange="uploadActiveReceipt(this)" style="display:none">

<h1>Lista de la compra</h1>
<div class="subtitle" id="subtitle">Cargando...</div>
<div class="offline-banner" id="offline-banner"></div>

<div id="list"></div>

<div class="bottom-panel">
  <div class="suggestions-section" id="suggestions-section" style="display:none">
    <div class="suggestions-label">Sugerencias</div>
    <div class="suggestions-chips" id="suggestions-chips"></div>
  </div>
  <div class="input-error" id="input-error">Ya está en la lista</div>
  <div class="add-form">
    <input type="text" id="newItem" placeholder="Añadir item..." autocomplete="off">
    <button onclick="addItem()">+</button>
  </div>
</div>

<!-- Category picker -->
<div class="cat-picker" id="cat-picker">
  <div class="cat-picker-backdrop" onclick="closeCatPicker()"></div>
  <div class="cat-picker-sheet">
    <div class="cat-picker-title">Categoría</div>
    <div class="cat-picker-item" id="cat-picker-item-name"></div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
</div>

<!-- History panel -->
<div class="history-panel" id="history-panel">
  <div class="history-backdrop" onclick="closeHistory()"></div>
  <div class="history-sheet">
    <div class="history-sheet-header">
      <span class="history-sheet-title">Historial</span>
      <button class="history-close-btn" onclick="closeHistory()" aria-label="Cerrar historial">✕</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<script>
// ── Categories ────────────────────────────────────────────────────
const CATEGORIES = [
  {id: 'fruta_verdura', label: 'Fruta y verdura', emoji: '🥦'},
  {id: 'lacteos',       label: 'Lácteos',          emoji: '🥛'},
  {id: 'carne_pescado', label: 'Carne y pescado',  emoji: '🥩'},

  {id: 'bebidas',       label: 'Bebidas',           emoji: '🥤'},

  'ajo':       'fruta_verdura', 'ajos':      'fruta_verdura',

  // Lácteos
  'leche':         'lacteos', 'yogur':      'lacteos',

  // Carne y pescado
  'pollo':         'carne_pescado', 'ternera':    'carne_pescado',

  'jamon':         'carne_pescado', 'salchichas': 'carne_pescado',

function _autoCategory(name) {
  return AUTO_MAP[name.toLowerCase().trim()] || null;
}

function _catInfo(id) {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1];
}

function _resolveCategory(item) {
  return item.category || _autoCategory(item.name) || null;
}

// ── State ─────────────────────────────────────────────────────────
let _items = [];
let _isOnline = navigator.onLine;
let _syncing = false;
let _bootstrapped = false;
let _receiptCount = 0;

// ── Config ────────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const urlApiKey = urlParams.get('api_key');
if (urlApiKey) {
  localStorage.setItem('lista_api_key', urlApiKey);
  window.history.replaceState({}, '', window.location.pathname);
}
function getAPI()    { return localStorage.getItem('lista_api_url') || ''; }
function getAPIKey() { return localStorage.getItem('lista_api_key') || ''; }
function apiHeaders() {
  const h = {'Content-Type': 'application/json'};
  const k = getAPIKey();
  if (k) h['X-API-Key'] = k;
  return h;
}

// ── Pending queue ─────────────────────────────────────────────────
function _getPending()     { return JSON.parse(localStorage.getItem('lista_pending') || '[]'); }
function _savePending(ops) { localStorage.setItem('lista_pending', JSON.stringify(ops)); }
function _enqueue(op)      { const ops = _getPending(); ops.push(op); _savePending(ops); }
function _dequeue()        { const ops = _getPending(); ops.shift(); _savePending(ops); }

// ── Cache ─────────────────────────────────────────────────────────
function _saveCache(items) { localStorage.setItem('lista_cache', JSON.stringify(items)); }
function _loadCache()      { return JSON.parse(localStorage.getItem('lista_cache') || '[]'); }

// ── Merge server state + pending queue ────────────────────────────
function _merge(serverItems) {
  let items = serverItems.map(i => ({...i}));
  for (const op of _getPending()) {
    if (op.type === 'add') {
      if (!items.find(i => i.name === op.name))
        items.push({name: op.name, added: op.added || '', checked: false, category: op.category || null});
    } else if (op.type === 'check') {
      const item = items.find(i => i.name === op.name);
      if (item) item.checked = op.checked;
    } else if (op.type === 'remove') {
      items = items.filter(i => i.name !== op.name);
    } else if (op.type === 'category') {
      const item = items.find(i => i.name === op.name);
      if (item) item.category = op.category;
    }
  }
  return items;
}

// ── Offline banner ────────────────────────────────────────────────
function _updateBanner() {
  const el = document.getElementById('offline-banner');
  if (!el) return;
  const n = _getPending().length;
  const txt = n => `${n} cambio${n !== 1 ? 's' : ''} pendiente${n !== 1 ? 's' : ''}`;
  if (!_isOnline && n > 0)   { el.className = 'offline-banner offline'; el.textContent = `Sin conexión · ${txt(n)}`; el.style.display = 'block'; }
  else if (!_isOnline)        { el.className = 'offline-banner offline'; el.textContent = 'Sin conexión'; el.style.display = 'block'; }
  else if (_syncing)          { el.className = 'offline-banner syncing'; el.textContent = `Sincronizando ${txt(n)}…`; el.style.display = 'block'; }
  else if (n > 0)             { el.className = 'offline-banner pending'; el.textContent = `${txt(n)} · reintentando…`; el.style.display = 'block'; }
  else                        { el.style.display = 'none'; }
}

// ── Sync ──────────────────────────────────────────────────────────
async function _syncPending() {
  if (_syncing || !_isOnline) return;
  if (!_getPending().length) return;
  _syncing = true;
  _updateBanner();
  while (_getPending().length > 0) {
    const op = _getPending()[0];
    try {
      let url, body;
      if      (op.type === 'add')      { url = `${getAPI()}/api/add`;      body = {name: op.name, category: op.category || null}; }
      else if (op.type === 'check')    { url = `${getAPI()}/api/check`;    body = {name: op.name, checked: op.checked}; }
      else if (op.type === 'remove')   { url = `${getAPI()}/api/remove`;   body = {name: op.name}; }
      else if (op.type === 'category') { url = `${getAPI()}/api/category`; body = {name: op.name, category: op.category}; }
      else { _dequeue(); continue; }
      const res = await fetch(url, {method: 'POST', headers: apiHeaders(), body: JSON.stringify(body)});
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      _dequeue();
    } catch(e) {
      _syncing = false;
      _updateBanner();
      setTimeout(() => { if (_getPending().length > 0 && _isOnline && !_syncing) _syncPending(); }, 5000);
      return;
    }
  }
  _syncing = false;
  _updateBanner();
}

// ── Bootstrap categories for existing items ───────────────────────
async function _bootstrapCategories(serverItems) {
  if (_bootstrapped) return;
  _bootstrapped = true;
  const toUpdate = serverItems.filter(i => !i.category && _autoCategory(i.name));
  for (const item of toUpdate) {
    try {
      await fetch(`${getAPI()}/api/category`, {
        method: 'POST', headers: apiHeaders(),
        body: JSON.stringify({name: item.name, category: _autoCategory(item.name)})
      });
    } catch(e) {}
  }
}

// ── Online / offline events ───────────────────────────────────────
window.addEventListener('online',  () => { _isOnline = true;  _updateBanner(); if (_getPending().length && !_syncing) _syncPending(); });
window.addEventListener('offline', () => { _isOnline = false; _updateBanner(); });

// ── Suggestions ───────────────────────────────────────────────────
let _suggestions = [];
let _dismissed = new Set();
let _suggestionsTimer = null;

function scheduleSuggestionsRefresh() {
  clearTimeout(_suggestionsTimer);
  _suggestionsTimer = setTimeout(loadSuggestions, 1500);
}
async function loadSuggestions() {
  try {
    const res = await fetch(`${getAPI()}/api/suggestions`);
    const data = await res.json();
    _suggestions = (data.suggestions || []).filter(s => !_dismissed.has(s.name));
    renderSuggestions();
  } catch(e) {}
}
function renderSuggestions() {
  const section = document.getElementById('suggestions-section');
  const chips   = document.getElementById('suggestions-chips');
  const visible = _suggestions.filter(s => !_dismissed.has(s.name));
  if (!visible.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  chips.innerHTML = visible.map(s => {
    const n = escapeHtml(s.name);
    return `<div class="chip" onclick="addFromSuggestion('${n}')"><span class="chip-name">${n}</span></div>`;
  }).join('') + `<button class="chip-clear" onclick="clearSuggestions()">Borrar</button>`;
}
function clearSuggestions() { _suggestions.forEach(s => _dismissed.add(s.name)); renderSuggestions(); }

// ── Toast / input error / subtitle ───────────────────────────────
let _errorTimer = null;
function showInputError() {
  const el = document.getElementById('input-error');
  el.classList.add('show');
  clearTimeout(_errorTimer);
  _errorTimer = setTimeout(() => el.classList.remove('show'), 2000);
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
function updateSubtitle() {
  const total = _items.length;
  const done  = _items.filter(i => i.checked).length;
  document.getElementById('subtitle').textContent =
    total > 0 ? `${done} de ${total} comprados` : 'Lista vacía';
}

// ── Render (grouped) ──────────────────────────────────────────────
function render(items) {
  const container = document.getElementById('list');
  if (!items.length) {
    container.innerHTML = `<div class="empty"><div class="emoji">🛒</div>Lista vacía<br><span style="font-size:0.85rem">Añade items abajo</span></div>`;
    return;
  }

  // Build groups
  const groups = new Map();
  for (const item of items) {
    const cat = _resolveCategory(item) || 'otros';
    if (!groups.has(cat)) groups.set(cat, []);
    groups.get(cat).push(item);
  }

  // Sort: groups with more unchecked first, 'otros' last
  const sorted = [...groups.entries()].sort(([a, ia], [b, ib]) => {
    if (a === 'otros' && b !== 'otros') return 1;
    if (b === 'otros' && a !== 'otros') return -1;
    const ua = ia.filter(i => !i.checked).length;
    const ub = ib.filter(i => !i.checked).length;
    return ub - ua;
  });

  let html = '';
  for (const [cat, catItems] of sorted) {
    const info   = _catInfo(cat);
    const done   = catItems.filter(i => i.checked).length;
    const total  = catItems.length;
    const allDone = done === total;
    html += `<div class="cat-group${allDone ? ' all-done' : ''}">`;
    html += `<div class="cat-header">
      <span class="cat-header-emoji">${info.emoji}</span>
      <span class="cat-header-label">${escapeHtml(info.label)}</span>
      <span class="cat-header-count">${done}/${total}</span>
    </div>`;
    const sortedItems = [...catItems].sort((a, b) => a.checked === b.checked ? 0 : a.checked ? 1 : -1);
    for (const item of sortedItems) {
      const idx  = items.indexOf(item);
      const info = _catInfo(_resolveCategory(item) || 'otros');
      const priceHtml = item.price != null ? `<span class="item-price">${parseFloat(item.price).toFixed(2)} €</span>` : '';
      html += `<div class="item${item.checked ? ' checked' : ''}" data-index="${idx}" onclick="toggleCheck(${idx})">
        <div class="checkbox">${item.checked ? '✓' : ''}</div>
        <span class="item-name">${escapeHtml(item.name)}</span>
        ${priceHtml}
        <span class="item-added">${item.added || ''}</span>
        <button class="cat-btn" onclick="event.stopPropagation();openCatPicker(${idx})" title="Categoría">⋯</button>
        <button class="delete-btn" onclick="event.stopPropagation();removeItem(${idx})">✕</button>
      </div>`;
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function simplifyStore(name) {
  if (!name) return '';
  if (name.includes(' + ')) return name.split(' + ').map(simplifyStore).join(' + ');
  const SKIP = new Set(['grupo', 'centro', 'super', 'supermercado', 'hipermercado',
    'comercial', 'tienda', 'sl', 'sa', 'slu', 'srl', 'ltd', 'llc']);
  for (const w of name.trim().split(/\s+/)) {
    if (!SKIP.has(w.toLowerCase().replace(/[.,]/g, '')))
      return w.charAt(0).toUpperCase() + w.slice(1);
  }
  return name;
}

// ── Category picker ───────────────────────────────────────────────
let _pickerIdx = null;

function openCatPicker(idx) {
  _pickerIdx = idx;
  const item = _items[idx];
  if (!item) return;
  const current = _resolveCategory(item) || 'otros';
  document.getElementById('cat-picker-item-name').textContent = item.name;
  document.getElementById('cat-grid').innerHTML = CATEGORIES.map(c => `
    <div class="cat-option${c.id === current ? ' selected' : ''}" onclick="applyCategory('${c.id}')">
      <span class="cat-option-emoji">${c.emoji}</span>
      <span class="cat-option-label">${c.label}</span>
    </div>
  `).join('');
  document.getElementById('cat-picker').classList.add('open');
}

function closeCatPicker() {
  document.getElementById('cat-picker').classList.remove('open');
  _pickerIdx = null;
}

async function applyCategory(categoryId) {
  closeCatPicker();
  const item = _items[_pickerIdx !== null ? _pickerIdx : -1];
  if (!item) return;
  item.category = categoryId;
  render(_items);
  if (!_isOnline) {
    _enqueue({type: 'category', name: item.name, category: categoryId});
    _updateBanner();
    return;
  }
  try {
    const res = await fetch(`${getAPI()}/api/category`, {
      method: 'POST', headers: apiHeaders(),
      body: JSON.stringify({name: item.name, category: categoryId})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) {
    _enqueue({type: 'category', name: item.name, category: categoryId});
    _updateBanner();
  }
}

// ── Toggle check ──────────────────────────────────────────────────
async function toggleCheck(idx) {
  if (!_items[idx]) return;
  const item = _items[idx];
  const newChecked = !item.checked;
  item.checked = newChecked;
  render(_items);
  updateSubtitle();
  if (!_isOnline) { _enqueue({type: 'check', name: item.name, checked: newChecked}); _updateBanner(); return; }
  try {
    const res = await fetch(`${getAPI()}/api/check`, {
      method: 'POST', headers: apiHeaders(),
      body: JSON.stringify({name: item.name, checked: newChecked})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) { _enqueue({type: 'check', name: item.name, checked: newChecked}); _updateBanner(); }
}

// ── Add item ──────────────────────────────────────────────────────
async function addItem() {
  const input = document.getElementById('newItem');
  const name  = input.value.trim();
  if (!name) return;
  if (_items.find(i => i.name === name)) { showInputError(); return; }
  input.value = ''; input.focus();
  const today    = new Date().toLocaleDateString('es-ES', {day: 'numeric', month: 'short'});
  const category = _autoCategory(name);
  _items.push({name, added: today, checked: false, category});
  render(_items); updateSubtitle();
  if (!_isOnline) { _enqueue({type: 'add', name, added: today, category}); _updateBanner(); return; }
  try {
    const res = await fetch(`${getAPI()}/api/add`, {
      method: 'POST', headers: apiHeaders(),
      body: JSON.stringify({name, category})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) { _enqueue({type: 'add', name, added: today, category}); _updateBanner(); }
}

// ── Add from suggestion ───────────────────────────────────────────
async function addFromSuggestion(name) {
  if (_items.find(i => i.name === name)) { _dismissed.add(name); renderSuggestions(); return; }
  _dismissed.add(name); renderSuggestions();
  const today    = new Date().toLocaleDateString('es-ES', {day: 'numeric', month: 'short'});
  const category = _autoCategory(name);
  _items.push({name, added: today, checked: false, category});
  render(_items); updateSubtitle();
  if (!_isOnline) { _enqueue({type: 'add', name, added: today, category}); _updateBanner(); return; }
  try {
    const res = await fetch(`${getAPI()}/api/add`, {
      method: 'POST', headers: apiHeaders(),
      body: JSON.stringify({name, category})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) { _enqueue({type: 'add', name, added: today, category}); _updateBanner(); }
}

// ── Remove item ───────────────────────────────────────────────────
async function removeItem(idx) {
  if (!_items[idx]) return;
  const item = _items[idx];
  _items.splice(idx, 1); render(_items); updateSubtitle();
  if (!_isOnline) { _enqueue({type: 'remove', name: item.name}); _updateBanner(); return; }
  try {
    const res = await fetch(`${getAPI()}/api/remove`, {
      method: 'POST', headers: apiHeaders(),
      body: JSON.stringify({name: item.name})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) { _enqueue({type: 'remove', name: item.name}); _updateBanner(); }
}

function _updateReceiptBtn() {
  const btn = document.getElementById('receipt-btn');
  if (!btn) return;
  btn.textContent = _receiptCount > 0 ? `📷 ${_receiptCount}` : '📷';
  btn.classList.toggle('has-receipts', _receiptCount > 0);
}

function openReceiptScan() {
  document.getElementById('receipt-file-input').click();
}

function _scanShow(spinning, icon, msg, msgClass, showClose) {
  document.getElementById('scan-spinner').style.display = spinning ? 'block' : 'none';
  const iconEl = document.getElementById('scan-icon');
  iconEl.style.display = icon ? 'block' : 'none';
  iconEl.textContent = icon || '';
  const msgEl = document.getElementById('scan-msg');
  msgEl.innerHTML = msg;
  msgEl.className = 'scan-msg' + (msgClass ? ' ' + msgClass : '');
  document.getElementById('scan-close').style.display = showClose ? 'block' : 'none';
  document.getElementById('scan-overlay').classList.add('active');
}

function closeScanOverlay() {
  document.getElementById('scan-overlay').classList.remove('active');
}

async function uploadActiveReceipt(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  _scanShow(true, null, 'Analizando ticket con IA...', '', false);
  try {
    const fd = new FormData();
    fd.append('receipt', file);
    const uploadHeaders = {};
    const k = getAPIKey();
    if (k) uploadHeaders['X-API-Key'] = k;
    const res = await fetch(`${getAPI()}/api/receipt`, {
      method: 'POST', headers: uploadHeaders, body: fd,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    _receiptCount++;
    _updateReceiptBtn();
    const store = simplifyStore(data.store_name) || 'Ticket procesado';
    const total = data.total_amount != null ? ` · <b>${parseFloat(data.total_amount).toFixed(2)} €</b>` : '';
    const added = data.added_count > 0 ? `<br><small>+${data.added_count} añadidos a la lista</small>` : '';
    _scanShow(false, '✅', `${store}${total}<br><small>${data.matched_count} artículos actualizados</small>${added}`, 'ok', false);
    setTimeout(closeScanOverlay, 3000);
  } catch(e) {
    const msg = e.message && e.message.length < 120 ? e.message : 'No se pudo procesar el ticket';
    _scanShow(false, '❌', msg, 'ko', true);
  }
}

async function resetList() {
  if (!confirm('¿Vaciar toda la lista?')) return;
  const prev = [..._items];
  _items = []; render(_items); updateSubtitle();
  try {
    const res = await fetch(`${getAPI()}/api/reset`, {method: 'POST', headers: apiHeaders()});
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    _savePending([]); _updateBanner(); toast('Lista vaciada');
    _receiptCount = 0; _updateReceiptBtn();
  } catch(e) { _items = prev; render(_items); updateSubtitle(); toast('Error al vaciar'); }
}

  const listEl = document.getElementById('history-list');

  panel.classList.add('open');

    const res = await fetch(`${getAPI()}/api/history`, { headers: apiHeaders() });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderHistory(data.history || []);
  } catch(e) {
    listEl.innerHTML = '<div class="history-empty">Error al cargar historial</div>';
  }
}

function closeHistory() {
  document.getElementById('history-panel').classList.remove('open');
}

function renderHistory(entries) {
  const el = document.getElementById('history-list');
  if (!entries.length) {
    el.innerHTML = '<div class="history-empty">Aún no hay listas guardadas</div>';
    return;
  }
  el.innerHTML = entries.map(e => {
    const d = new Date(e.saved_at);
    const dateStr = d.toLocaleDateString('es-ES', {day: 'numeric', month: 'short', year: 'numeric'})
                  + ' · ' + d.toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit'});
    const pct = e.item_count > 0 ? Math.round(e.checked_count / e.item_count * 100) : 0;
    const arts = e.item_count === 1 ? 'artículo' : 'artículos';
    const comp = e.checked_count === 1 ? 'comprado' : 'comprados';
    const storeHtml = e.store_name ? `<div class="history-store"><span class="store-tag">${simplifyStore(e.store_name)}</span></div>` : '';
    const totalHtml = e.total_amount != null ? `<span class="history-total"> · ${parseFloat(e.total_amount).toFixed(2)} €</span>` : '';
    return `<div class="history-entry" data-history-id="${e.id}" onclick="toggleHistoryDetail(this, ${e.id})">
      <div class="history-entry-header">
        <div class="history-entry-meta">
          <div class="history-date">${dateStr}</div>
          <div class="history-summary">${e.item_count} ${arts}${totalHtml}</div>
          <div class="history-pct">${e.checked_count} ${comp} · ${pct}%</div>
          ${storeHtml}
        </div>
        <span class="history-chevron">▾</span>
      </div>
      <div class="history-detail"></div>
    </div>`;
  }).join('');
}


const _historyCache = {};

async function toggleHistoryDetail(el, id) {
  const detail = el.querySelector('.history-detail');
  if (el.classList.contains('expanded')) {
    el.classList.remove('expanded');
    return;
  }
  if (detail.dataset.loaded) {
    el.classList.add('expanded');
    return;
  }
  detail.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;padding:8px 0">Cargando...</div>';
  el.classList.add('expanded');
  try {
    const res = await fetch(`${getAPI()}/api/history/${id}`, { headers: apiHeaders() });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    _historyCache[id] = data.items || [];
    renderHistoryDetail(detail, id, data.items || []);
    detail.dataset.loaded = '1';
  } catch(e) {
    detail.innerHTML = '<div style="color:var(--red);font-size:0.82rem;padding:8px 0">Error al cargar</div>';
  }
}

function renderHistoryDetail(container, historyId, items) {
  const purchased = items.filter(i => i.checked);
  if (!purchased.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;padding:8px 0">Sin artículos comprados</div>';
    return;
  }
  const catMap = Object.fromEntries(CATEGORIES.map(c => [c.id, c.emoji]));
  const catOrder = Object.fromEntries(CATEGORIES.map((c, i) => [c.id, i]));
  const catRank = item => item.category != null ? (catOrder[item.category] ?? CATEGORIES.length) : CATEGORIES.length;
  const sorted = [...purchased].sort((a, b) => catRank(a) - catRank(b));
  container.innerHTML = sorted.map(item => {
    const emoji = item.category ? (catMap[item.category] || '') : '';
    const qtyHtml = item.quantity != null
      ? `<span class="history-item-qty">${parseFloat(item.quantity) % 1 === 0 ? parseInt(item.quantity) : parseFloat(item.quantity)}${item.unit ? ' ' + item.unit : ''}</span>`
      : '';
    const priceHtml = item.price != null ? `<span class="history-item-price">${parseFloat(item.price).toFixed(2)} €</span>` : '';
    const storeHtml = item.store_name ? `<span class="store-tag" style="margin-left:4px">${simplifyStore(item.store_name)}</span>` : '';
    const nameEsc = escapeHtml(item.name).replace(/'/g, "\\'");
    return `<div class="history-detail-item" onclick="openHistoryItemEdit(${historyId},'${nameEsc}')">
      <div style="display:flex;align-items:center;width:100%">
        <span class="history-detail-cat">${emoji}</span>
        <span class="history-detail-name">${escapeHtml(item.name)}</span>
        ${qtyHtml}${priceHtml}${storeHtml}
      </div>
    </div>`;
  }).join('');
}

// ── History item edit ─────────────────────────────────────────────
let _editHistoryId = null, _editItemName = null;

function openHistoryItemEdit(historyId, itemName) {
  const items = _historyCache[historyId] || [];
  const item = items.find(i => i.name === itemName);
  if (!item) return;
  _editHistoryId = historyId;
  _editItemName = itemName;
  document.getElementById('edit-name').textContent = itemName;
  document.getElementById('edit-price').value = item.price != null ? parseFloat(item.price).toFixed(2) : '';
  document.getElementById('edit-qty').value = item.quantity != null ? parseFloat(item.quantity) : '';
  document.getElementById('edit-unit').value = item.unit || '';
  document.getElementById('edit-overlay').classList.add('active');
}

function cancelHistoryEdit() {
  document.getElementById('edit-overlay').classList.remove('active');
}

async function saveHistoryEdit() {
  const price = document.getElementById('edit-price').value;
  const qty   = document.getElementById('edit-qty').value;
  const unit  = document.getElementById('edit-unit').value;
  try {
    const res = await fetch(`${getAPI()}/api/history/${_editHistoryId}/item`, {
      method: 'PATCH', headers: apiHeaders(),
      body: JSON.stringify({
        name: _editItemName,
        price: price !== '' ? parseFloat(price) : null,
        quantity: qty !== '' ? parseFloat(qty) : null,
        unit: unit || null,
      })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    // Reload detail
    const res2 = await fetch(`${getAPI()}/api/history/${_editHistoryId}`, { headers: apiHeaders() });
    const data = await res2.json();
    _historyCache[_editHistoryId] = data.items || [];
    const entryEl = document.querySelector(`.history-entry[data-history-id="${_editHistoryId}"]`);
    if (entryEl) {
      const detail = entryEl.querySelector('.history-detail');
      renderHistoryDetail(detail, _editHistoryId, data.items || []);
    }
    cancelHistoryEdit();
    toast('Guardado');
  } catch(e) {
    toast('Error al guardar');
  }
}

// ── Keyboard shortcut ─────────────────────────────────────────────
document.getElementById('newItem').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

// ── SSE ───────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource(`${getAPI()}/api/stream`);
  es.onmessage = (e) => {
    const serverItems = JSON.parse(e.data).items || [];
    _saveCache(serverItems);
    _items = _merge(serverItems);
    render(_items);
    updateSubtitle();
    scheduleSuggestionsRefresh();
    if (_getPending().length > 0 && !_syncing) _syncPending();
    _bootstrapCategories(serverItems);
  };
  es.onerror = () => {
    const cached = _loadCache();
    if (cached.length > 0 && _items.length === 0) {
      _items = _merge(cached); render(_items); updateSubtitle();
    }
  };
}

// ── Init ──────────────────────────────────────────────────────────
const _cachedOnLoad = _loadCache();
if (_cachedOnLoad.length > 0) {
  _items = _merge(_cachedOnLoad); render(_items); updateSubtitle();
}
_updateBanner();
connectSSE();
loadSuggestions();
// Restore receipt session state (survives page refresh)
(async () => {
  try {
    const res = await fetch(`${getAPI()}/api/receipts`, { headers: apiHeaders() });
    if (res.ok) {
      const data = await res.json();
      _receiptCount = (data.receipts || []).length;
      _updateReceiptBtn();
    }
  } catch(e) {}
})();
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lista de la compra</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lista">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#1971c2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
<style>
  :root {
    --bg: #f5f5f0;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #888;
    --green: #2b8a3e;
    --red: #e03131;
    --blue: #1971c2;
    --border: #dee2e6;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111113;
      --card: #1e1e22;
      --text: #e8e8e8;
      --muted: #888;
      --green: #40c057;
      --red: #ff6b6b;
      --blue: #4dabf7;
      --border: #2e2e36;
      --shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    padding-bottom: 200px;
    max-width: 600px;
    margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  .item {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: opacity 0.2s, transform 0.15s;
    cursor: pointer;
    user-select: none;
    min-height: 52px;
  }
  .item:active { transform: scale(0.98); }
  .item.checked { opacity: 0.55; }
  .item.checked .item-name { text-decoration: line-through; color: var(--muted); }
  .checkbox {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: 2.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .item.checked .checkbox { background: var(--green); border-color: var(--green); color: white; }
  .item-name { flex: 1; font-size: 1.05rem; font-weight: 500; }
  .item-added { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; }
  .item.pending-op .item-name { opacity: 0.7; }
  .delete-btn {
    background: none;
    border: none;
    color: var(--red);
    font-size: 1.2rem;
    padding: 4px 8px;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s;
  }
  .delete-btn:active { opacity: 1; }

  /* Offline banner */
  .offline-banner {
    display: none;
    padding: 9px 16px;
    font-size: 0.82rem;
    font-weight: 600;
    text-align: center;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .offline-banner.offline  { background: #868e96; color: #fff; }
  .offline-banner.syncing  { background: var(--blue); color: #fff; }
  .offline-banner.pending  { background: #f59f00; color: #fff; }

  /* Bottom panel */
  .bottom-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 600px;
    margin: 0 auto;
    background: var(--card);
    box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
    padding-bottom: max(0px, env(safe-area-inset-bottom));
  }

  /* Add form */
  .add-form {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
  }
  .add-form input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-form input:focus { border-color: var(--blue); }
  .input-error {
    font-size: 0.78rem;
    color: var(--red);
    padding: 0 16px 6px;
    display: none;
  }
  .input-error.show { display: block; }
  .add-form button {
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .add-form button:active { background: #1558b0; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .emoji { font-size: 3rem; margin-bottom: 12px; }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .settings-icon {
    position: fixed;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s;
    z-index: 50;
  }
  .settings-icon:active { opacity: 1; }

  /* Suggestions */
  .suggestions-section {
    padding: 8px 16px 6px;
    border-bottom: 1px solid var(--border);
  }
  .suggestions-label {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .suggestions-chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
    align-items: center;
  }
  .suggestions-chips::-webkit-scrollbar { display: none; }
  .chip {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    white-space: nowrap;
    flex-shrink: 0;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .chip:active { background: var(--border); }
  .chip-name { font-size: 0.88rem; font-weight: 500; }
  .chip-clear {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    padding: 7px 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<button class="settings-icon" onclick="resetList()" title="Vaciar lista">🗑️</button>

<h1>Lista de la compra</h1>
<div class="subtitle" id="subtitle">Cargando...</div>
<div class="offline-banner" id="offline-banner"></div>

<div id="list"></div>

<div class="bottom-panel">
  <div class="suggestions-section" id="suggestions-section" style="display:none">
    <div class="suggestions-label">Sugerencias</div>
    <div class="suggestions-chips" id="suggestions-chips"></div>
  </div>
  <div class="input-error" id="input-error">Ya está en la lista</div>
  <div class="add-form">
    <input type="text" id="newItem" placeholder="Añadir item..." autocomplete="off">
    <button onclick="addItem()">+</button>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────
let _items = [];
let _isOnline = navigator.onLine;
let _syncing = false;

// ── Config ────────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const urlApiKey = urlParams.get('api_key');
if (urlApiKey) {
  localStorage.setItem('lista_api_key', urlApiKey);
  window.history.replaceState({}, '', window.location.pathname);
}
function getAPI() { return localStorage.getItem('lista_api_url') || ''; }
function getAPIKey() { return localStorage.getItem('lista_api_key') || ''; }
function apiHeaders() {
  const h = {'Content-Type': 'application/json'};
  const k = getAPIKey();
  if (k) h['X-API-Key'] = k;
  return h;
}

// ── Pending queue ────────────────────────────────────────────────
function _getPending() { return JSON.parse(localStorage.getItem('lista_pending') || '[]'); }
function _savePending(ops) { localStorage.setItem('lista_pending', JSON.stringify(ops)); }
function _enqueue(op) { const ops = _getPending(); ops.push(op); _savePending(ops); }
function _dequeue() { const ops = _getPending(); ops.shift(); _savePending(ops); }

// ── Cache (last known server state) ──────────────────────────────
function _saveCache(items) { localStorage.setItem('lista_cache', JSON.stringify(items)); }
function _loadCache() { return JSON.parse(localStorage.getItem('lista_cache') || '[]'); }

// ── Merge server state + pending queue ───────────────────────────
function _merge(serverItems) {
  let items = serverItems.map(i => ({...i}));
  for (const op of _getPending()) {
    if (op.type === 'add') {
      if (!items.find(i => i.name === op.name))
        items.push({name: op.name, added: op.added || '', checked: false});
    } else if (op.type === 'check') {
      const item = items.find(i => i.name === op.name);
      if (item) item.checked = op.checked;
    } else if (op.type === 'remove') {
      items = items.filter(i => i.name !== op.name);
    }
  }
  return items;
}

// ── Offline banner ────────────────────────────────────────────────
function _updateBanner() {
  const el = document.getElementById('offline-banner');
  if (!el) return;
  const n = _getPending().length;
  const pendingTxt = n => `${n} cambio${n !== 1 ? 's' : ''} pendiente${n !== 1 ? 's' : ''}`;
  if (!_isOnline && n > 0) {
    el.className = 'offline-banner offline';
    el.textContent = `Sin conexión · ${pendingTxt(n)}`;
    el.style.display = 'block';
  } else if (!_isOnline) {
    el.className = 'offline-banner offline';
    el.textContent = 'Sin conexión';
    el.style.display = 'block';
  } else if (_syncing) {
    el.className = 'offline-banner syncing';
    el.textContent = `Sincronizando ${pendingTxt(n)}…`;
    el.style.display = 'block';
  } else if (n > 0) {
    el.className = 'offline-banner pending';
    el.textContent = `${pendingTxt(n)} · reintentando…`;
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

// ── Sync pending queue ────────────────────────────────────────────
async function _syncPending() {
  if (_syncing || !_isOnline) return;
  if (!_getPending().length) return;
  _syncing = true;
  _updateBanner();
  while (_getPending().length > 0) {
    const op = _getPending()[0];
    try {
      let url, body;
      if      (op.type === 'add')    { url = `${getAPI()}/api/add`;    body = {name: op.name}; }
      else if (op.type === 'check')  { url = `${getAPI()}/api/check`;  body = {name: op.name, checked: op.checked}; }
      else if (op.type === 'remove') { url = `${getAPI()}/api/remove`; body = {name: op.name}; }
      else { _dequeue(); continue; }
      const res = await fetch(url, {method: 'POST', headers: apiHeaders(), body: JSON.stringify(body)});
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      _dequeue();
    } catch(e) {
      _syncing = false;
      _updateBanner();
      setTimeout(() => { if (_getPending().length > 0 && _isOnline && !_syncing) _syncPending(); }, 5000);
      return;
    }
  }
  _syncing = false;
  _updateBanner();
}

// ── Online / offline events ───────────────────────────────────────
window.addEventListener('online',  () => { _isOnline = true;  _updateBanner(); if (_getPending().length && !_syncing) _syncPending(); });
window.addEventListener('offline', () => { _isOnline = false; _updateBanner(); });

// ── Suggestions ───────────────────────────────────────────────────
let _suggestions = [];
let _dismissed = new Set();
let _suggestionsTimer = null;

function scheduleSuggestionsRefresh() {
  clearTimeout(_suggestionsTimer);
  _suggestionsTimer = setTimeout(loadSuggestions, 1500);
}
async function loadSuggestions() {
  try {
    const res = await fetch(`${getAPI()}/api/suggestions`);
    const data = await res.json();
    _suggestions = (data.suggestions || []).filter(s => !_dismissed.has(s.name));
    renderSuggestions();
  } catch(e) {}
}
function renderSuggestions() {
  const section = document.getElementById('suggestions-section');
  const chips = document.getElementById('suggestions-chips');
  const visible = _suggestions.filter(s => !_dismissed.has(s.name));
  if (!visible.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  chips.innerHTML = visible.map(s => {
    const n = escapeHtml(s.name);
    return `<div class="chip" onclick="addFromSuggestion('${n}')"><span class="chip-name">${n}</span></div>`;
  }).join('') + `<button class="chip-clear" onclick="clearSuggestions()">Borrar</button>`;
}
function clearSuggestions() { _suggestions.forEach(s => _dismissed.add(s.name)); renderSuggestions(); }

// ── Input error / toast / subtitle ───────────────────────────────
let _errorTimer = null;
function showInputError() {
  const el = document.getElementById('input-error');
  el.classList.add('show');
  clearTimeout(_errorTimer);
  _errorTimer = setTimeout(() => el.classList.remove('show'), 2000);
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
function updateSubtitle() {
  const total = _items.length;
  const done = _items.filter(i => i.checked).length;
  document.getElementById('subtitle').textContent =
    total > 0 ? `${done} de ${total} comprados` : 'Lista vacía';
}

// ── Render ────────────────────────────────────────────────────────
function render(items) {
  const container = document.getElementById('list');
  if (!items.length) {
    container.innerHTML = `<div class="empty"><div class="emoji">🛒</div>Lista vacía<br><span style="font-size:0.85rem">Añade items abajo</span></div>`;
    return;
  }
  container.innerHTML = items.map((item, idx) => `
    <div class="item ${item.checked ? 'checked' : ''}" data-index="${idx}" onclick="toggleCheck(${idx})">
      <div class="checkbox">${item.checked ? '✓' : ''}</div>
      <span class="item-name">${escapeHtml(item.name)}</span>
      <span class="item-added">${item.added || ''}</span>
      <button class="delete-btn" onclick="event.stopPropagation(); removeItem(${idx})">✕</button>
    </div>
  `).join('');
}
function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ── Toggle check ──────────────────────────────────────────────────
async function toggleCheck(idx) {
  if (!_items[idx]) return;
  const item = _items[idx];
  const newChecked = !item.checked;
  item.checked = newChecked;
  render(_items);
  updateSubtitle();
  if (!_isOnline) {
    _enqueue({type: 'check', name: item.name, checked: newChecked});
    _updateBanner();
    return;
  }
  try {
    const res = await fetch(`${getAPI()}/api/check`, {
      method: 'POST', headers: apiHeaders(),
      body: JSON.stringify({name: item.name, checked: newChecked})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) {
    _enqueue({type: 'check', name: item.name, checked: newChecked});
    _updateBanner();
  }
}

// ── Add item ──────────────────────────────────────────────────────
async function addItem() {
  const input = document.getElementById('newItem');
  const name = input.value.trim();
  if (!name) return;
  if (_items.find(i => i.name === name)) { showInputError(); return; }
  input.value = '';
  input.focus();
  const today = new Date().toLocaleDateString('es-ES', {day: 'numeric', month: 'short'});
  _items.push({name, added: today, checked: false});
  render(_items);
  updateSubtitle();
  if (!_isOnline) {
    _enqueue({type: 'add', name, added: today});
    _updateBanner();
    return;
  }
  try {
    const res = await fetch(`${getAPI()}/api/add`, {
      method: 'POST', headers: apiHeaders(),
      body: JSON.stringify({name})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) {
    _enqueue({type: 'add', name, added: today});
    _updateBanner();
  }
}

// ── Add from suggestion ───────────────────────────────────────────
async function addFromSuggestion(name) {
  if (_items.find(i => i.name === name)) { _dismissed.add(name); renderSuggestions(); return; }
  _dismissed.add(name);
  renderSuggestions();
  const today = new Date().toLocaleDateString('es-ES', {day: 'numeric', month: 'short'});
  _items.push({name, added: today, checked: false});
  render(_items);
  updateSubtitle();
  if (!_isOnline) {
    _enqueue({type: 'add', name, added: today});
    _updateBanner();
    return;
  }
  try {
    const res = await fetch(`${getAPI()}/api/add`, {
      method: 'POST', headers: apiHeaders(),
      body: JSON.stringify({name})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) {
    _enqueue({type: 'add', name, added: today});
    _updateBanner();
  }
}

// ── Remove item ───────────────────────────────────────────────────
async function removeItem(idx) {
  if (!_items[idx]) return;
  const item = _items[idx];
  _items.splice(idx, 1);
  render(_items);
  updateSubtitle();
  if (!_isOnline) {
    _enqueue({type: 'remove', name: item.name});
    _updateBanner();
    return;
  }
  try {
    const res = await fetch(`${getAPI()}/api/remove`, {
      method: 'POST', headers: apiHeaders(),
      body: JSON.stringify({name: item.name})
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
  } catch(e) {
    _enqueue({type: 'remove', name: item.name});
    _updateBanner();
  }
}

// ── Reset list ────────────────────────────────────────────────────
async function resetList() {
  if (!confirm('¿Vaciar toda la lista?')) return;
  const prev = [..._items];
  _items = [];
  render(_items);
  updateSubtitle();
  try {
    const res = await fetch(`${getAPI()}/api/reset`, {method: 'POST', headers: apiHeaders()});
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    _savePending([]);
    _updateBanner();
    toast('Lista vaciada');
  } catch(e) {
    _items = prev;
    render(_items);
    updateSubtitle();
    toast('Error al vaciar');
  }
}

// ── Keyboard shortcut ─────────────────────────────────────────────
document.getElementById('newItem').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

// ── SSE ───────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource(`${getAPI()}/api/stream`);
  es.onmessage = (e) => {
    const serverItems = JSON.parse(e.data).items || [];
    _saveCache(serverItems);
    _items = _merge(serverItems);
    render(_items);
    updateSubtitle();
    scheduleSuggestionsRefresh();
    if (_getPending().length > 0 && !_syncing) _syncPending();
  };
  es.onerror = () => {
    // If we have a cache, show it merged with pending so user sees their data
    const cached = _loadCache();
    if (cached.length > 0 && _items.length === 0) {
      _items = _merge(cached);
      render(_items);
      updateSubtitle();
    }
  };
}

// ── Init ──────────────────────────────────────────────────────────
// Show pending items from previous session before SSE connects
const _cachedOnLoad = _loadCache();
if (_cachedOnLoad.length > 0) {
  _items = _merge(_cachedOnLoad);
  render(_items);
  updateSubtitle();
}
_updateBanner();
connectSSE();
loadSuggestions();
</script>
</body>
</html>
